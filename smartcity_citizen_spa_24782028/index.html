<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Warga - Smart City Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f6f9; }
        .spa-container { min-height: calc(100vh - 80px); }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold" href="#"><i class="bi bi-buildings-fill me-2"></i>Smart City Portal</a>
            <div id="nav-menus" class="ms-auto"></div>
        </div>
    </nav>

    <main class="container-fluid px-4 mt-4 spa-container" id="app-content"></main>

    <div class="modal fade" id="reportModal" tabindex="-1" aria-labelledby="reportModalTitle" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" id="reportModalTitle">Laporan Baru</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Tutup"></button>
                </div>
                <div class="modal-body">
                    <div id="reportFormError" class="alert alert-danger d-none" role="alert"></div>
                    <form id="reportForm" class="needs-validation" novalidate>
                        <div class="mb-3">
                            <label for="reportTitle" class="form-label fw-semibold">Judul</label>
                            <input type="text" class="form-control" id="reportTitle" name="title" required>
                            <div class="invalid-feedback">Judul laporan wajib diisi.</div>
                        </div>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="reportCategory" class="form-label fw-semibold">Kategori</label>
                                <input type="text" class="form-control" id="reportCategory" name="category" required>
                                <div class="invalid-feedback">Kategori laporan wajib diisi.</div>
                            </div>
                            <div class="col-md-6">
                                <label for="reportLocation" class="form-label fw-semibold">Lokasi</label>
                                <input type="text" class="form-control" id="reportLocation" name="location" required>
                                <div class="invalid-feedback">Lokasi laporan wajib diisi.</div>
                            </div>
                        </div>
                        <div class="mt-3">
                            <label for="reportDescription" class="form-label fw-semibold">Deskripsi</label>
                            <textarea class="form-control" id="reportDescription" name="description" rows="4" required></textarea>
                            <div class="invalid-feedback">Deskripsi laporan wajib diisi.</div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Batal</button>
                    <button type="button" class="btn btn-warning" id="btnDraft">
                        <i class="bi bi-save me-1"></i>Simpan Draft
                    </button>
                    <button type="button" class="btn btn-primary" id="btnSubmit">
                        <i class="bi bi-send me-1"></i>Ajukan
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script src="js/router.js"></script>
</body>
</html>
