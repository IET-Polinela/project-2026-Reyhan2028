<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Tentang Saya - Smart City</title>
    <style>
        /* Mengambil gaya dari home agar konsisten */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            text-align: center; 
            margin-top: 50px; 
            background-color: #f0f2f5; 
        }
        .card { 
            background: white; 
            padding: 40px; 
            display: inline-block; 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            width: 500px; 
            text-align: center;
        }
        h1 { color: #1a73e8; margin-bottom: 20px; }
        p { color: #5f6368; line-height: 1.6; font-size: 1.1em; }
        strong { color: #202124; }
        
        .back-link { 
            display: inline-block; 
            margin-top: 25px; 
            text-decoration: none; 
            color: white; 
            background-color: #1a73e8;
            padding: 10px 20px; 
            border-radius: 5px; 
            transition: background 0.3s;
            font-weight: bold;
        }
        .back-link:hover { 
            background-color: #1557b0; 
        }

        /* Dekorasi tambahan supaya tidak sepi */
        .profile-icon {
            font-size: 50px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="profile-icon">👤</div>
        <h1>Tentang Saya</h1>
        <hr style="border: 0; border-top: 1px solid #eee; margin-bottom: 25px;">
        
        <p>Halo! Nama saya <strong>Reyhan Aditya</strong>.</p>
        <p>Saya adalah mahasiswa di <strong>Politeknik Negeri Lampung</strong> yang sedang menempuh mata kuliah Pemrograman Internet.</p>
       
        <a href="{% url 'home' %}" class="back-link">← Kembali ke Beranda</a>
    </div>
</body>
</html>
