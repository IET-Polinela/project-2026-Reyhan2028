<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Detail Laporan - Smart City</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin-top: 50px; background-color: #f0f2f5; display: flex; justify-content: center; }
        .card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 600px; }
        h1 { color: #1a73e8; margin-bottom: 10px; }
        .info-group { margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .label { font-weight: bold; color: #5f6368; display: block; font-size: 0.9em; }
        .value { font-size: 1.1em; color: #202124; }
        .back-link { display: inline-block; margin-top: 20px; text-decoration: none; color: #1a73e8; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Detail Laporan</h1>
        <p>Informasi lengkap mengenai keluhan warga.</p>
        <hr>

        <div class="info-group">
            <span class="label">Judul Masalah</span>
            <span class="value">{{ object.title }}</span>
        </div>
        <div class="info-group">
            <span class="label">Kategori</span>
            <span class="value">{{ object.category }}</span>
        </div>
        <div class="info-group">
            <span class="label">Lokasi</span>
            <span class="value">{{ object.location }}</span>
        </div>
        <div class="info-group">
            <span class="label">Deskripsi</span>
            <span class="value">{{ object.description }}</span>
        </div>
        <div class="info-group">
            <span class="label">Status Saat Ini</span>
            <span class="value" style="font-weight: bold; color: #1a73e8;">{{ object.get_status_display }}</span>
        </div>

        <a href="{% url 'home' %}" class="back-link">← Kembali ke Daftar</a>
    </div>
</body>
</html>
