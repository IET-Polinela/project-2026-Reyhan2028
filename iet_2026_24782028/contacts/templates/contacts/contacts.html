<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Hubungi Kami - Smart City</title>
    <style>
        /* Menggunakan gaya yang konsisten dengan halaman utama */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            text-align: center; 
            margin-top: 50px; 
            background-color: #f0f2f5; 
        }
        .card { 
            background: white; 
            padding: 40px; 
            display: inline-block; 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            width: 450px; 
            text-align: center;
        }
        h1 { color: #1a73e8; margin-bottom: 20px; }
        
        .contact-info {
            text-align: left;
            margin: 25px 0;
            padding: 15px;
            background-color: #f8f9fa;
            border-radius: 10px;
        }
        .contact-item {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }
        .icon {
            font-size: 20px;
            margin-right: 15px;
            width: 30px;
            text-align: center;
        }
        .label {
            font-weight: bold;
            color: #5f6368;
            display: block;
            font-size: 0.9em;
        }
        .value {
            color: #202124;
            font-size: 1em;
        }

        .back-link { 
            display: inline-block; 
            margin-top: 10px; 
            text-decoration: none; 
            color: white; 
            background-color: #1a73e8;
            padding: 10px 25px; 
            border-radius: 5px; 
            transition: background 0.3s;
            font-weight: bold;
        }
        .back-link:hover { 
            background-color: #1557b0; 
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Hubungi Kami</h1>
        <p style="color: #5f6368;">Jika Anda memiliki pertanyaan mengenai sistem pelaporan Smart City, silakan hubungi kontak di bawah ini.</p>
        
        <div class="contact-info">
            <div class="contact-item">
                <div class="icon">📧</div>
                <div>
                    <span class="label">Email</span>
                    <span class="value">Reyhanganteng@student.polinela.ac.id</span>
                </div>
            </div>
            <div class="contact-item">
                <div class="icon">📍</div>
                <div>
                    <span class="label">Lokasi</span>
                    <span class="value">Bandar Lampung, Indonesia</span>
                </div>
            </div>
            <div class="contact-item">
                <div class="icon">🏛️</div>
                <div>
                    <span class="label">Institusi</span>
                    <span class="value">Politeknik Negeri Lampung</span>
                </div>
            </div>
        </div>

        <a href="{% url 'home' %}" class="back-link">← Kembali ke Beranda</a>
    </div>
</body>
</html>
